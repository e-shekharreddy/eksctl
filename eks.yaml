apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

# CRITICAL: This fixes the "OIDC is disabled" error in your logs
iam:
  withOIDC: true 

managedNodeGroups:
  - name: spot
    instanceTypes: ["c5.large","c5d.large","c5n.large","c5a.large","c6i.large","c6a.large"]
    spot: true
    desiredCapacity: 2
    iam:
      withAddonPolicies:
        vpcCNI: true